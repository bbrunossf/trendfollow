<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <title>Trend Following – Validação FR</title>

        <!-- Plotly -->
        <script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>

        <!-- GridJS -->
        <link
            href="https://unpkg.com/gridjs/dist/theme/mermaid.min.css"
            rel="stylesheet"
        />
        <script src="https://unpkg.com/gridjs/dist/gridjs.umd.js"></script>

        <link rel="stylesheet" href="/static/css/dashboard.css" />
    </head>

    <body>
        <!-- ================= HEADER (≈ 8vh) ================= -->
        <header class="topbar">
            <div class="topbar-left">
                <span class="logo">QuantumTrade</span>
                <span class="subtitle">Terminal</span>
            </div>

            <div class="topbar-center">
                <label>Reference date</label>
                <input type="date" id="referenceDate" />
            </div>

            <div class="topbar-right">
                <span class="status">● Market Open</span>
                <button onclick="runPipeline()">Run Analysis</button>
            </div>
        </header>

        <!-- ================= MAIN (92vh) ================= -->
        <main class="dashboard">
            <!-- ================= OVERVIEW (≈ 34vh) ================= -->
            <section class="analysis-row">
                <div class="card" >
                    <h3>Evolução de preços — últimos 6 meses</h3>
                    <div id="chart" class="chart-container"></div>
                </div>

                <!-- ================= TABLE (≈ 34vh) ================= -->
                <div class="card card-table" >
                    <div id="table"></div>
                </div>
            </section>

            <!-- ================= ANALYSIS (≈ 40vh) ================= -->
            <section class="analysis-row">
                <!-- Candlestick (≈ 68%) -->
                <div class="card card-candlestick">
                    <h3>Candlestick — ativo selecionado</h3>
                    <div id="candlechart" class="chart-container"></div>
                </div>

                <!-- Scatter (≈ 32%) -->
                <div class="card card-scatter">
                    <h3>Risco × Retorno</h3>
                    <div id="scatterchart" class="chart-container"></div>
                </div>
            </section>
        </main>

        <!-- ================= SCRIPTS ================= -->
        <script src="/static/js/candlechart.js"></script>
        <script src="/static/js/table.js"></script>
        <script src="/static/js/fr_chart.js"></script>
        <script src="/static/js/scatterchart.js"></script>
    </body>
</html>
